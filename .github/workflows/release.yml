name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  actions: read

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io

jobs:
  prepare:
    name: Read package metadata
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.meta.outputs.package_name }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      image_name: ${{ steps.meta.outputs.image_name }}
      release_needed: ${{ steps.release.outputs.release_needed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Read Cargo.toml
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          cargo = Path("Cargo.toml").read_text(encoding="utf-8")
          package = re.search(
              r'(?ms)^\[package\].*?^name\s*=\s*"([^"]+)".*?^version\s*=\s*"([^"]+)"',
              cargo,
          )
          if not package:
              raise SystemExit("Cannot read package name/version from Cargo.toml")

          name, version = package.groups()
          tag = f"v{version}"
          repository = os.environ["GITHUB_REPOSITORY"].lower()
          image_name = f"ghcr.io/{repository}"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"package_name={name}\n")
              output.write(f"version={version}\n")
              output.write(f"tag={tag}\n")
              output.write(f"image_name={image_name}\n")
          PY

      - name: Check whether version was already released
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail

          release_needed=true

          if gh release view "$TAG" >/dev/null 2>&1; then
            release_needed=false
            echo "Release ${TAG} already exists. Skip build and publish."
          else
            status="$(gh api -i "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" 2>/dev/null | awk 'NR==1 {print $2; exit}' || true)"
            if [[ "$status" == "200" ]]; then
              release_needed=false
              echo "Tag ${TAG} already exists. Skip build and publish."
            else
              echo "Release ${TAG} does not exist. Build and publish."
            fi
          fi

          echo "release_needed=${release_needed}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs: prepare
    if: needs.prepare.outputs.release_needed == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            exe_suffix: .exe
            archive_ext: zip
          - label: windows-arm64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            exe_suffix: .exe
            archive_ext: zip
          - label: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            exe_suffix: ""
            archive_ext: tar.gz
          - label: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            exe_suffix: ""
            archive_ext: tar.gz
          - label: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            exe_suffix: ""
            archive_ext: tar.gz
          - label: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            exe_suffix: ""
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
            export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
            export CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++
          fi
          cargo build --locked --release --target "${{ matrix.target }}" --bin crosspaste-server

      - name: Package binary
        shell: bash
        run: |
          set -euo pipefail

          package_name='${{ needs.prepare.outputs.package_name }}'
          version='${{ needs.prepare.outputs.version }}'
          target='${{ matrix.target }}'
          label='${{ matrix.label }}'
          exe_suffix='${{ matrix.exe_suffix }}'
          archive_ext='${{ matrix.archive_ext }}'

          binary="target/${target}/release/${package_name}${exe_suffix}"
          if [[ ! -f "$binary" ]]; then
            echo "Binary not found: $binary" >&2
            ls -la "target/${target}/release" || true
            exit 1
          fi

          rm -rf dist package
          mkdir -p dist package

          binary_name="${package_name}-${label}${exe_suffix}"
          cp "$binary" "package/${binary_name}"
          cp README.md package/README.md
          if [[ -f .env.demo ]]; then
            cp .env.demo package/.env.demo
          fi

          asset_base="${package_name}-v${version}-${label}"
          if [[ "$archive_ext" == "zip" ]]; then
            asset="dist/${asset_base}.zip"
            if command -v zip >/dev/null 2>&1; then
              (cd package && zip -qr "../${asset}" .)
            elif command -v pwsh >/dev/null 2>&1; then
              pwsh -NoProfile -Command "Compress-Archive -Path 'package/*' -DestinationPath '${asset}' -Force"
            elif command -v powershell.exe >/dev/null 2>&1; then
              powershell.exe -NoProfile -Command "Compress-Archive -Path 'package/*' -DestinationPath '${asset}' -Force"
            else
              echo "No zip tool available" >&2
              exit 1
            fi
          else
            asset="dist/${asset_base}.tar.gz"
            tar -czf "$asset" -C package .
          fi

          if [[ ! -f "$asset" ]]; then
            echo "Asset not created: $asset" >&2
            exit 1
          fi

          echo "asset=${asset}" >> "$GITHUB_ENV"
          ls -lh "$asset"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ needs.prepare.outputs.package_name }}-${{ matrix.label }}
          path: ${{ env.asset }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  docker:
    name: Build and push Docker image
    needs: prepare
    if: needs.prepare.outputs.release_needed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ needs.prepare.outputs.image_name }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=raw,value=${{ needs.prepare.outputs.tag }}
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  release:
    name: Publish GitHub Release
    needs:
      - prepare
      - build
      - docker
    if: |
      always() &&
      needs.prepare.outputs.release_needed == 'true' &&
      needs.prepare.result == 'success' &&
      needs.docker.result == 'success' &&
      needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          pattern: ${{ needs.prepare.outputs.package_name }}-*
          merge-multiple: true
          if-no-files-found: error

      - name: Verify release assets
        shell: bash
        run: |
          set -euo pipefail
          echo "Downloaded assets:"
          find dist -type f -print | sort
          count="$(find dist -type f | wc -l | tr -d ' ')"
          if [[ "$count" -lt 1 ]]; then
            echo "No release assets downloaded" >&2
            exit 1
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          PACKAGE_NAME: ${{ needs.prepare.outputs.package_name }}
          IMAGE_NAME: ${{ needs.prepare.outputs.image_name }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          mapfile -t assets < <(find dist -type f | sort)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No assets found under dist/" >&2
            exit 1
          fi

          notes_file="$(mktemp)"
          {
            echo "Automated release for ${PACKAGE_NAME} ${VERSION}."
            echo
            echo "## Docker"
            echo
            echo '```bash'
            echo "docker pull ${IMAGE_NAME}:${VERSION}"
            echo "docker run --rm -p 39445:39445 -v crosspaste-data:/data ${IMAGE_NAME}:${VERSION}"
            echo '```'
            echo
            echo "Images:"
            echo "- \`${IMAGE_NAME}:${VERSION}\`"
            echo "- \`${IMAGE_NAME}:${TAG}\`"
            echo "- \`${IMAGE_NAME}:latest\`"
            echo
            echo "Platforms: \`linux/amd64\`, \`linux/arm64\`"
            echo
            echo "## Binaries"
            echo
            echo "Multi-platform archives are attached below."
          } > "$notes_file"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${assets[@]}" --clobber
            gh release edit "$TAG" --notes-file "$notes_file" --target "$TARGET_SHA"
          else
            gh release create "$TAG" "${assets[@]}" \
              --title "${PACKAGE_NAME} ${VERSION}" \
              --notes-file "$notes_file" \
              --target "$TARGET_SHA"
          fi
