name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io

jobs:
  prepare:
    name: Read package metadata
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.meta.outputs.package_name }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      image_name: ${{ steps.meta.outputs.image_name }}
      release_needed: ${{ steps.release.outputs.release_needed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Cargo.toml
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          cargo = Path("Cargo.toml").read_text(encoding="utf-8")
          package = re.search(
              r'(?ms)^\[package\].*?^name\s*=\s*"([^"]+)".*?^version\s*=\s*"([^"]+)"',
              cargo,
          )
          if not package:
              raise SystemExit("Cannot read package name/version from Cargo.toml")

          name, version = package.groups()
          tag = f"v{version}"
          repository = os.environ["GITHUB_REPOSITORY"].lower()
          image_name = f"ghcr.io/{repository}"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"package_name={name}\n")
              output.write(f"version={version}\n")
              output.write(f"tag={tag}\n")
              output.write(f"image_name={image_name}\n")
          PY

      - name: Check whether version was already released
        id: release
        shell: bash
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "release_needed=false" >> "$GITHUB_OUTPUT"
            echo "Release ${TAG} already exists. Skip build and publish."
          else
            echo "release_needed=true" >> "$GITHUB_OUTPUT"
            echo "Release ${TAG} does not exist. Build and publish."
          fi

  build:
    name: Build ${{ matrix.label }}
    needs: prepare
    if: needs.prepare.outputs.release_needed == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            exe_suffix: .exe
            archive_ext: zip
            linker: ""
          - label: windows-arm64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            exe_suffix: .exe
            archive_ext: zip
            linker: ""
          - label: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            exe_suffix: ""
            archive_ext: tar.gz
            linker: ""
          - label: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            exe_suffix: ""
            archive_ext: tar.gz
            linker: aarch64-linux-gnu-gcc
          - label: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            exe_suffix: ""
            archive_ext: tar.gz
            linker: ""
          - label: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            exe_suffix: ""
            archive_ext: tar.gz
            linker: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }} --bin crosspaste-server
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}

      - name: Package binary
        shell: pwsh
        run: |
          $packageName = "${{ needs.prepare.outputs.package_name }}"
          $version = "${{ needs.prepare.outputs.version }}"
          $target = "${{ matrix.target }}"
          $label = "${{ matrix.label }}"
          $exeSuffix = "${{ matrix.exe_suffix }}"
          $archiveExt = "${{ matrix.archive_ext }}"

          $binary = Join-Path "target/$target/release" "$packageName$exeSuffix"
          if (!(Test-Path $binary)) {
            throw "Binary not found: $binary"
          }

          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path package | Out-Null

          $binaryName = "$packageName-$label$exeSuffix"
          Copy-Item $binary (Join-Path package $binaryName)
          Copy-Item README.md package/README.md
          if (Test-Path .env.demo) {
            Copy-Item .env.demo package/.env.demo
          }

          $assetBase = "$packageName-v$version-$label"
          if ($archiveExt -eq "zip") {
            $asset = "dist/$assetBase.zip"
            Compress-Archive -Path package/* -DestinationPath $asset -Force
          } else {
            $asset = "dist/$assetBase.tar.gz"
            tar -czf $asset -C package .
          }

          "asset=$asset" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.package_name }}-${{ matrix.label }}
          path: ${{ env.asset }}
          if-no-files-found: error

  docker:
    name: Build and push Docker image
    needs: prepare
    if: needs.prepare.outputs.release_needed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prepare.outputs.image_name }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=raw,value=${{ needs.prepare.outputs.tag }}
            type=raw,value=latest

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  release:
    name: Publish GitHub Release
    needs:
      - prepare
      - build
      - docker
    if: needs.prepare.outputs.release_needed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          PACKAGE_NAME: ${{ needs.prepare.outputs.package_name }}
          IMAGE_NAME: ${{ needs.prepare.outputs.image_name }}
        run: |
          set -euo pipefail

          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

          notes="$(cat <<EOF
Automated release for ${PACKAGE_NAME} ${VERSION}.

## Docker

\`\`\`bash
docker pull ${IMAGE_NAME}:${VERSION}
docker run --rm -p 39445:39445 -v crosspaste-data:/data ${IMAGE_NAME}:${VERSION}
\`\`\`

Images:
- \`${IMAGE_NAME}:${VERSION}\`
- \`${IMAGE_NAME}:${TAG}\`
- \`${IMAGE_NAME}:latest\`

Platforms: \`linux/amd64\`, \`linux/arm64\`

## Binaries

Multi-platform archives are attached below.
EOF
)"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
            gh release edit "$TAG" --notes "$notes"
          else
            gh release create "$TAG" dist/* \
              --title "${PACKAGE_NAME} ${VERSION}" \
              --notes "$notes"
          fi
